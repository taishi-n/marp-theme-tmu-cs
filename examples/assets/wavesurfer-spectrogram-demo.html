<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>wavesurfer.js spectrogram demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Noto Sans JP", "Noto Sans CJK JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      }

      body {
        margin: 0;
        background: #f8fcfa;
        color: #1c2520;
      }

      .wavesurfer-spectrogram-demo {
        width: 100%;
        box-sizing: border-box;
        padding: 0.8rem 1rem 1rem;
        border: 1px solid rgba(0, 101, 67, 0.18);
        border-radius: 0.55rem;
        background: linear-gradient(180deg, #f8fcfa 0%, #eef6f2 100%);
      }

      .wavesurfer-spectrogram-demo__toolbar {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.7rem;
      }

      .wavesurfer-spectrogram-demo__button {
        padding: 0.28rem 0.8rem;
        border: 0;
        border-radius: 999px;
        background: #006543;
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }

      .wavesurfer-spectrogram-demo__button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      .wavesurfer-spectrogram-demo__status {
        color: #5d6e65;
        font-size: 16px;
      }

      .wavesurfer-spectrogram-demo__waveform,
      .wavesurfer-spectrogram-demo__spectrogram {
        width: 100%;
        overflow: hidden;
        border-radius: 0.35rem;
        background: #ffffff;
      }

      .wavesurfer-spectrogram-demo__spectrogram {
        margin-top: 0.6rem;
        padding-top: 0.2rem;
      }
    </style>
  </head>
  <body>
    <div
      class="wavesurfer-spectrogram-demo"
      data-wavesurfer-spectrogram-demo
      data-frequency="440"
      data-duration="2"
    >
      <div class="wavesurfer-spectrogram-demo__toolbar">
        <button class="wavesurfer-spectrogram-demo__button" type="button" data-playpause>Play</button>
        <span class="wavesurfer-spectrogram-demo__status" data-status>Loading…</span>
      </div>
      <div class="wavesurfer-spectrogram-demo__waveform" data-waveform></div>
      <div class="wavesurfer-spectrogram-demo__spectrogram" data-spectrogram></div>
    </div>
    <script src="./wavesurfer-spectrogram-demo.js"></script>
  </body>
</html>
